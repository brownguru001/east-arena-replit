<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>East Arena — My Dashboard</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { background: #0A0E14; color: #fff; font-family: system-ui, -apple-system, sans-serif; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin   { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
    @keyframes shimmer { 0% { background-position:-200% center; } 100% { background-position:200% center; } }
    .fade-in { animation: fadeIn .5s ease forwards; }
    .spin    { animation: spin .8s linear infinite; }
    .shimmer-text { background: linear-gradient(90deg,#f59e0b 0%,#fcd34d 50%,#f59e0b 100%); background-size:200% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:shimmer 3s linear infinite; }
    input:focus { outline:none; border-color:#f59e0b !important; box-shadow:0 0 0 3px rgba(245,158,11,0.15); }
    .card-border-confirmed { border-color: rgba(52,211,153,0.3); }
    .card-border-pending   { border-color: rgba(245,158,11,0.3); }
    .card-border-rejected  { border-color: rgba(248,113,113,0.3); }
  </style>
</head>
<body class="min-h-screen">

  <!-- Nav -->
  <nav class="bg-[#0A0E14]/90 backdrop-blur-md border-b border-amber-500/10 px-4 py-3 sticky top-0 z-50">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <a href="/" class="flex flex-col leading-tight">
        <span class="text-xl font-black text-amber-400">🏆 EAST ARENA</span>
        <span class="text-[10px] text-slate-500 font-semibold uppercase tracking-widest -mt-0.5">Player Dashboard</span>
      </a>
      <div class="flex items-center gap-3">
        <a href="/" class="text-slate-400 hover:text-white text-sm transition">Home</a>
        <a href="/#register" onclick="location.href='/';return false;" class="px-4 py-2 bg-amber-500 text-black font-black rounded-xl text-sm hover:bg-amber-400 transition">Register</a>
      </div>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-4 py-10">

    <!-- Lookup Form -->
    <div id="lookup-section">
      <div class="text-center mb-10">
        <div class="text-5xl mb-4">🎫</div>
        <h1 class="text-3xl font-black text-white mb-2">MY REGISTRATIONS</h1>
        <p class="text-slate-500">Enter your email or Ticket ID to view all your registrations</p>
      </div>

      <div class="max-w-md mx-auto">
        <div id="lookup-error" class="hidden bg-red-500/10 border border-red-500/30 text-red-300 rounded-xl p-4 text-sm mb-5"></div>

        <div class="bg-slate-900/80 border border-slate-800 rounded-2xl p-6">
          <div class="flex gap-2 mb-5">
            <button id="tab-email" onclick="switchTab('email')" class="flex-1 py-2 text-sm font-bold rounded-xl bg-amber-500 text-black">By Email</button>
            <button id="tab-ticket" onclick="switchTab('ticket')" class="flex-1 py-2 text-sm font-bold rounded-xl bg-slate-700 text-slate-300 hover:bg-slate-600 transition">By Ticket ID</button>
          </div>

          <form id="lookup-form">
            <div id="email-field">
              <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wide mb-1.5">📧 Email Address</label>
              <input id="lookup-email" type="email" placeholder="your@email.com" autocomplete="email"
                class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white placeholder-slate-500 transition mb-4" />
            </div>
            <div id="ticket-field" class="hidden">
              <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wide mb-1.5">🎫 Ticket ID</label>
              <input id="lookup-ticket" type="text" placeholder="e.g. A1B2C3D4" maxlength="8"
                class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-white placeholder-slate-500 transition font-mono uppercase mb-4" />
            </div>
            <button type="submit" id="lookup-btn" class="w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-3 rounded-xl transition">
              🔍 Find My Registrations
            </button>
          </form>
        </div>
      </div>
    </div>

    <!-- Results -->
    <div id="results-section" class="hidden">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-black text-white">Your Registrations</h2>
        <button onclick="resetLookup()" class="text-sm text-amber-400 hover:underline">← Search Again</button>
      </div>
      <div id="registrations-list" class="space-y-5"></div>
    </div>

  </div>

<script>
  let currentTab = 'email';

  function switchTab(tab) {
    currentTab = tab;
    if (tab === 'email') {
      document.getElementById('email-field').classList.remove('hidden');
      document.getElementById('ticket-field').classList.add('hidden');
      document.getElementById('tab-email').className = 'flex-1 py-2 text-sm font-bold rounded-xl bg-amber-500 text-black';
      document.getElementById('tab-ticket').className = 'flex-1 py-2 text-sm font-bold rounded-xl bg-slate-700 text-slate-300 hover:bg-slate-600 transition';
    } else {
      document.getElementById('ticket-field').classList.remove('hidden');
      document.getElementById('email-field').classList.add('hidden');
      document.getElementById('tab-email').className = 'flex-1 py-2 text-sm font-bold rounded-xl bg-slate-700 text-slate-300 hover:bg-slate-600 transition';
      document.getElementById('tab-ticket').className = 'flex-1 py-2 text-sm font-bold rounded-xl bg-amber-500 text-black';
    }
  }

  function resetLookup() {
    document.getElementById('results-section').classList.add('hidden');
    document.getElementById('lookup-section').classList.remove('hidden');
    document.getElementById('lookup-error').classList.add('hidden');
  }

  function fmt(n) { return Number(n).toLocaleString(); }
  function fmtDate(d) { return new Date(d).toLocaleDateString('en-NG', { day:'numeric', month:'short', year:'numeric' }); }
  function esc(s) { return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function statusBadge(s) {
    const c = {
      confirmed: 'bg-green-500/20 text-green-400 border border-green-500/30',
      pending:   'bg-yellow-500/20 text-yellow-300 border border-yellow-500/30',
      rejected:  'bg-red-500/20 text-red-400 border border-red-500/30'
    };
    const l = { confirmed: '✓ Confirmed', pending: '⏳ Pending', rejected: '✗ Rejected' };
    return `<span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${c[s]||'bg-slate-600/50 text-slate-300'}">${l[s]||s}</span>`;
  }

  function renderRegistrations(regs) {
    if (!regs.length) {
      document.getElementById('registrations-list').innerHTML = `
        <div class="bg-slate-900/80 border border-slate-800 rounded-2xl p-10 text-center">
          <div class="text-4xl mb-3">🎮</div>
          <p class="text-slate-400 font-semibold">No registrations found</p>
          <p class="text-slate-600 text-sm mt-1">Check your email address or try a different Ticket ID</p>
          <a href="/" class="inline-block mt-5 px-6 py-2.5 bg-amber-500 text-black font-bold rounded-xl text-sm hover:bg-amber-400 transition">Register Now →</a>
        </div>`;
      return;
    }

    document.getElementById('registrations-list').innerHTML = regs.map(r => {
      const isFree = r.tournament && r.tournament.entryFee === 0;
      const borderClass = r.paymentStatus === 'confirmed' ? 'border-green-500/20' : r.paymentStatus === 'rejected' ? 'border-red-500/20' : 'border-amber-500/20';
      return `
      <div class="bg-slate-900/80 border ${borderClass} rounded-2xl overflow-hidden fade-in">
        <div class="p-5">
          <div class="flex justify-between items-start mb-4">
            <div>
              <div class="font-black text-white text-lg">${esc(r.playerName)}</div>
              <div class="text-amber-400 font-bold text-sm">@${esc(r.gamertag)}</div>
            </div>
            <div class="text-right">
              ${statusBadge(r.paymentStatus)}
              ${r.checkedIn ? '<div class="mt-1.5 text-xs font-bold text-green-400">✓ Checked In</div>' : ''}
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3 text-sm mb-4">
            <div class="bg-slate-800/50 rounded-xl p-3">
              <div class="text-slate-500 text-xs mb-0.5">Tournament</div>
              <div class="font-semibold text-white text-sm">${r.tournament ? esc(r.tournament.name) : 'Unknown'}</div>
            </div>
            <div class="bg-slate-800/50 rounded-xl p-3">
              <div class="text-slate-500 text-xs mb-0.5">Game</div>
              <div class="font-semibold text-white text-sm">${r.tournament ? esc(r.tournament.game) : '—'}</div>
            </div>
            <div class="bg-slate-800/50 rounded-xl p-3">
              <div class="text-slate-500 text-xs mb-0.5">Ticket ID</div>
              <div class="font-mono font-black text-amber-400 text-base tracking-widest">${r.ticketId}</div>
            </div>
            <div class="bg-slate-800/50 rounded-xl p-3">
              <div class="text-slate-500 text-xs mb-0.5">Entry Fee</div>
              <div class="font-bold ${isFree ? 'text-teal-400' : 'text-white'}">${isFree ? 'FREE' : '₦' + fmt(r.tournament?.entryFee || 0)}</div>
            </div>
            <div class="bg-slate-800/50 rounded-xl p-3">
              <div class="text-slate-500 text-xs mb-0.5">Event Date</div>
              <div class="font-semibold text-white text-sm">${r.tournament ? fmtDate(r.tournament.date) : '—'}</div>
            </div>
            <div class="bg-slate-800/50 rounded-xl p-3">
              <div class="text-slate-500 text-xs mb-0.5">Registered</div>
              <div class="font-semibold text-white text-sm">${fmtDate(r.registeredAt)}</div>
            </div>
          </div>

          ${r.paymentStatus === 'pending' && !isFree ? `
          <div class="bg-yellow-500/10 border border-yellow-500/20 rounded-xl p-3 text-sm mb-4">
            <p class="text-yellow-400 font-bold mb-1">⏳ Payment Pending</p>
            <p class="text-slate-400 text-xs">Transfer <strong class="text-white">₦${fmt(r.tournament?.entryFee || 0)}</strong> using Ticket ID <strong class="font-mono text-amber-400">${r.ticketId}</strong> as narration.</p>
            ${r.paymentReference ? `<p class="text-green-400 text-xs mt-1">✓ Reference submitted: <span class="font-mono">${esc(r.paymentReference)}</span></p>` : ''}
          </div>` : ''}

          ${r.paymentStatus === 'rejected' ? `
          <div class="bg-red-500/10 border border-red-500/20 rounded-xl p-3 text-sm mb-4">
            <p class="text-red-400 font-bold mb-1">✗ Payment Rejected</p>
            <p class="text-slate-400 text-xs">Your payment could not be verified. Contact support or re-register if spots are available.</p>
          </div>` : ''}

          <div class="flex gap-2">
            <a href="/ticket/${r.ticketId}" class="flex-1 py-2.5 bg-amber-500 hover:bg-amber-400 text-black font-black rounded-xl text-sm text-center transition">
              🎫 View Ticket & QR
            </a>
            ${r.paymentStatus === 'pending' && !isFree && !r.paymentReference ? `
            <button onclick="openPaymentForm('${r.ticketId}')" class="px-4 py-2.5 bg-green-600 hover:bg-green-500 text-white font-bold rounded-xl text-sm transition">
              💳 Submit Ref
            </button>` : ''}
          </div>
        </div>

        <!-- Payment ref form (hidden by default) -->
        <div id="pay-form-${r.ticketId}" class="hidden bg-slate-800/50 border-t border-slate-800 p-4">
          <div id="pay-err-${r.ticketId}" class="hidden bg-red-500/10 border border-red-500/30 text-red-300 rounded-lg p-3 text-sm mb-3"></div>
          <div id="pay-ok-${r.ticketId}" class="hidden bg-green-500/10 border border-green-500/30 text-green-300 rounded-lg p-3 text-sm mb-3"></div>
          <form onsubmit="submitPaymentRef(event,'${r.ticketId}')" class="flex gap-2">
            <input id="ref-${r.ticketId}" type="text" placeholder="Bank transaction reference" class="flex-1 bg-slate-700 border border-slate-600 rounded-xl px-3 py-2 text-white text-sm placeholder-slate-500 focus:border-amber-400 focus:outline-none" />
            <button type="submit" class="px-4 py-2 bg-green-600 hover:bg-green-500 text-white font-bold rounded-xl text-sm transition">Submit</button>
          </form>
        </div>
      </div>`;
    }).join('');
  }

  function openPaymentForm(ticketId) {
    const form = document.getElementById('pay-form-' + ticketId);
    if (form) form.classList.toggle('hidden');
  }

  async function submitPaymentRef(e, ticketId) {
    e.preventDefault();
    const ref = document.getElementById('ref-' + ticketId)?.value.trim();
    const errEl = document.getElementById('pay-err-' + ticketId);
    const okEl  = document.getElementById('pay-ok-' + ticketId);
    if (!ref) return;
    errEl.classList.add('hidden'); okEl.classList.add('hidden');
    try {
      const res = await fetch('/api/submit-payment', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticketId, paymentReference: ref })
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error; errEl.classList.remove('hidden'); return; }
      okEl.textContent = '✓ Reference submitted! Admin will confirm shortly.';
      okEl.classList.remove('hidden');
      document.getElementById('ref-' + ticketId).value = '';
    } catch {
      errEl.textContent = 'Network error. Please try again.'; errEl.classList.remove('hidden');
    }
  }

  document.getElementById('lookup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('lookup-error');
    errEl.classList.add('hidden');
    const btn = document.getElementById('lookup-btn');
    btn.disabled = true;
    btn.textContent = 'Searching...';

    let body = {};
    if (currentTab === 'email') {
      const email = document.getElementById('lookup-email').value.trim();
      if (!email) { errEl.textContent = 'Please enter your email address.'; errEl.classList.remove('hidden'); btn.disabled = false; btn.textContent = '🔍 Find My Registrations'; return; }
      body = { email };
    } else {
      const ticketId = document.getElementById('lookup-ticket').value.trim().toUpperCase();
      if (!ticketId) { errEl.textContent = 'Please enter your Ticket ID.'; errEl.classList.remove('hidden'); btn.disabled = false; btn.textContent = '🔍 Find My Registrations'; return; }
      body = { ticketId };
    }

    try {
      const res = await fetch('/api/lookup', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) {
        errEl.textContent = data.error || 'No registrations found.';
        errEl.classList.remove('hidden');
        btn.disabled = false; btn.textContent = '🔍 Find My Registrations';
        return;
      }
      document.getElementById('lookup-section').classList.add('hidden');
      document.getElementById('results-section').classList.remove('hidden');
      renderRegistrations(Array.isArray(data) ? data : [data]);
    } catch {
      errEl.textContent = 'Network error. Please try again.';
      errEl.classList.remove('hidden');
    }
    btn.disabled = false; btn.textContent = '🔍 Find My Registrations';
  });

  document.getElementById('lookup-ticket').addEventListener('input', e => {
    e.target.value = e.target.value.toUpperCase();
  });
</script>
</body>
</html>
