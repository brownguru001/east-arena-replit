<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EAST ARENA - Premium Gaming Tournaments</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0F1419; color: #fff; }
    .gold { color: #D4AF37; }
    .teal { color: #00D9FF; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useEffect, createElement: h } = React;

    function EastArena() {
      const [page, setPage] = useState('home');
      const [tournaments, setTournaments] = useState([]);
      const [formData, setFormData] = useState({
        playerName: '', gamertag: '', phone: '', location: '', tournamentId: 1
      });
      const [ticketData, setTicketData] = useState(null);
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        fetch('/api/tournaments')
          .then(res => res.json())
          .then(data => setTournaments(data))
          .catch(err => console.error('Failed to load tournaments:', err));
      }, []);

      const handleRegister = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
          const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
          });
          const data = await res.json();
          setTicketData(data);
          setPage('ticket');
        } catch (error) {
          alert('Error: ' + error.message);
        }
        setLoading(false);
      };

      return h('div', { className: 'min-h-screen bg-slate-950' },
        // NAV
        h('nav', { className: 'bg-slate-900 border-b border-amber-500/20 p-4 sticky top-0 z-50' },
          h('div', { className: 'max-w-7xl mx-auto flex justify-between items-center' },
            h('div', { className: 'flex items-center gap-2 text-2xl font-black gold' }, '🏆 EAST ARENA'),
            h('div', { className: 'flex gap-4' },
              h('button', { onClick: () => setPage('home'), className: 'px-4 py-2 hover:text-amber-400' }, 'Home'),
              h('button', { onClick: () => setPage('register'), className: 'px-4 py-2 bg-amber-500 text-black rounded font-bold' }, 'Register')
            )
          )
        ),
        // MAIN
        h('main', { className: 'max-w-7xl mx-auto p-6' },
          page === 'home' && h(HomePage, { tournaments, setPage }),
          page === 'register' && h(RegisterPage, { tournaments, formData, setFormData, handleRegister, loading }),
          page === 'ticket' && h(TicketPage, { ticketData })
        )
      );
    }

    function HomePage({ tournaments, setPage }) {
      return h('div', { className: 'space-y-12' },
        // HERO
        h('div', { className: 'bg-gradient-to-r from-amber-600 to-amber-500 rounded-2xl p-12 text-center text-slate-900' },
          h('h1', { className: 'text-5xl font-black mb-3' }, 'EAST ARENA'),
          h('p', { className: 'text-xl font-semibold mb-8' }, 'Premium FIFA Gaming Tournaments'),
          h('button', { onClick: () => setPage('register'), className: 'bg-slate-900 text-amber-400 font-bold py-3 px-8 rounded-lg hover:scale-105 transition text-lg' }, 'JOIN A TOURNAMENT')
        ),
        // TOURNAMENTS
        h('div', null,
          h('h2', { className: 'text-3xl font-black gold mb-6' }, 'UPCOMING TOURNAMENTS'),
          h('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-6' },
            tournaments.length === 0
              ? h('p', { className: 'text-slate-400' }, 'Loading tournaments...')
              : tournaments.map(t =>
                  h('div', { key: t.id, className: 'bg-slate-800 border border-amber-500/30 rounded-xl p-6 hover:border-amber-400/60 transition' },
                    h('h3', { className: 'text-lg font-bold text-white mb-4' }, t.name),
                    h('div', { className: 'space-y-2 text-sm mb-4' },
                      h('p', null, h('span', { className: 'text-slate-400' }, 'Entry Fee: '), h('span', { className: 'teal font-bold' }, '\u20a6' + t.entryFee.toLocaleString())),
                      h('p', null, h('span', { className: 'text-slate-400' }, 'Prize Pool: '), h('span', { className: 'text-green-400 font-bold' }, '\u20a6' + (t.prizePool.first + t.prizePool.second + t.prizePool.third).toLocaleString())),
                      h('p', null, h('span', { className: 'text-slate-400' }, 'Date: '), h('span', { className: 'text-white' }, new Date(t.date).toLocaleDateString())),
                      h('p', null, h('span', { className: 'text-slate-400' }, 'Players: '), h('span', { className: 'text-white' }, t.registrations.length + '/16'))
                    ),
                    h('button', { onClick: () => setPage('register'), className: 'w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-2 rounded transition' }, 'REGISTER NOW')
                  )
                )
          )
        )
      );
    }

    function RegisterPage({ tournaments, formData, setFormData, handleRegister, loading }) {
      return h('div', { className: 'max-w-2xl mx-auto' },
        h('h2', { className: 'text-3xl font-black gold mb-8' }, 'TOURNAMENT REGISTRATION'),
        h('form', { onSubmit: handleRegister, className: 'bg-slate-800 border border-amber-500/30 rounded-xl p-8 space-y-6' },
          h('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-6' },
            h('input', { type: 'text', placeholder: 'Full Name', required: true, value: formData.playerName, onChange: e => setFormData({...formData, playerName: e.target.value}), className: 'bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:border-amber-400 focus:outline-none' }),
            h('input', { type: 'text', placeholder: 'Gamer Tag', required: true, value: formData.gamertag, onChange: e => setFormData({...formData, gamertag: e.target.value}), className: 'bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:border-amber-400 focus:outline-none' }),
            h('input', { type: 'tel', placeholder: 'Phone Number (0803...)', required: true, value: formData.phone, onChange: e => setFormData({...formData, phone: e.target.value}), className: 'bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:border-amber-400 focus:outline-none' }),
            h('input', { type: 'text', placeholder: 'Location (Your City)', required: true, value: formData.location, onChange: e => setFormData({...formData, location: e.target.value}), className: 'bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:border-amber-400 focus:outline-none' })
          ),
          h('select', { value: formData.tournamentId, onChange: e => setFormData({...formData, tournamentId: e.target.value}), className: 'w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white focus:border-amber-400 focus:outline-none' },
            tournaments.map(t => h('option', { key: t.id, value: t.id }, t.name + ' - \u20a6' + t.entryFee.toLocaleString()))
          ),
          h('button', { type: 'submit', disabled: loading, className: 'w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-3 rounded-lg transition disabled:opacity-50' },
            loading ? 'Processing...' : 'CONFIRM REGISTRATION'
          )
        )
      );
    }

    function TicketPage({ ticketData }) {
      const [confirmed, setConfirmed] = useState(false);

      const handlePaymentConfirm = async () => {
        await fetch('/api/confirm-payment/' + ticketData.ticketId, { method: 'POST' });
        setConfirmed(true);
      };

      if (!ticketData) return h('p', { className: 'text-slate-400' }, 'No ticket data.');

      return h('div', { className: 'max-w-2xl mx-auto' },
        h('h2', { className: 'text-3xl font-black gold mb-8' }, 'YOUR TICKET'),
        !confirmed
          ? h('div', { className: 'bg-slate-800 border border-amber-500/30 rounded-xl p-8 text-center space-y-6' },
              h('div', { className: 'text-2xl font-black teal' }, '\u2713 Registration Successful!'),
              h('p', { className: 'text-slate-300' }, 'Your Ticket ID: ', h('span', { className: 'font-bold text-amber-400' }, ticketData.ticketId)),
              h('div', { className: 'bg-slate-700 p-6 rounded-lg' },
                h('p', { className: 'text-sm text-slate-400 mb-4' }, 'Next Step: Complete Payment via Paystack'),
                h('button', {
                  onClick: () => { alert('Paystack payment flow:\n1. Click Pay\n2. Complete payment\n3. Return to ticket'); handlePaymentConfirm(); },
                  className: 'w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition'
                }, 'PROCEED TO PAYMENT (\u20a6' + (ticketData.paymentInfo ? ticketData.paymentInfo.amount.toLocaleString() : '') + ')')
              ),
              h('p', { className: 'text-xs text-slate-400' }, "You'll receive an SMS confirmation after payment")
            )
          : h('div', { className: 'bg-slate-800 border border-green-500/30 rounded-xl p-8 text-center space-y-6' },
              h('div', { className: 'text-2xl font-black text-green-400' }, '\u2713 PAYMENT CONFIRMED'),
              h('p', { className: 'text-slate-300' }, 'Your Digital Ticket is ready. Screenshot or show at venue.'),
              h('div', { className: 'bg-white p-6 rounded-lg inline-block' },
                h('div', { className: 'w-48 h-48 bg-slate-300 flex items-center justify-center rounded' }, 'QR CODE ' + ticketData.ticketId)
              ),
              h('div', { className: 'bg-slate-700 p-4 rounded-lg text-left text-sm space-y-2' },
                h('p', null, h('span', { className: 'text-slate-400' }, 'Ticket ID: '), h('span', { className: 'font-mono teal' }, ticketData.ticketId))
              ),
              h('p', { className: 'text-xs text-slate-400' }, 'Show this QR code at the venue entrance')
            )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(EastArena));
  </script>
</body>
</html>
