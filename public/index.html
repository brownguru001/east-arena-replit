<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EAST ARENA - Premium Gaming Tournaments</title>
  <link rel="icon" href="/favicon.svg" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0F1419; color: #fff; font-family: system-ui, sans-serif; }
    .gold { color: #D4AF37; }
    .teal { color: #00D9FF; }
    input, select, textarea { color-scheme: dark; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, createElement: h } = React;

// ─── Helpers ────────────────────────────────────────────────
function fmt(n) { return Number(n).toLocaleString(); }
function fmtDate(d) { return new Date(d).toLocaleDateString(); }

function Badge({ status }) {
  const cfg = {
    confirmed: ['bg-green-600', '✓ Confirmed'],
    pending:   ['bg-yellow-500 text-slate-900', '⏳ Pending'],
    rejected:  ['bg-red-600', '✗ Rejected'],
  };
  const [cls, label] = cfg[status] || ['bg-slate-600', status];
  return h('span', { className: `px-2 py-0.5 rounded text-xs font-bold ${cls}` }, label);
}

// ─── Input ──────────────────────────────────────────────────
function Input({ label, ...props }) {
  return h('div', null,
    label && h('label', { className: 'block text-slate-400 text-xs uppercase mb-1' }, label),
    h('input', {
      className: 'w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:border-amber-400 focus:outline-none',
      ...props
    })
  );
}

// ─── Nav ────────────────────────────────────────────────────
function Nav({ page, setPage }) {
  return h('nav', { className: 'bg-slate-900 border-b border-amber-500/20 p-4 sticky top-0 z-50' },
    h('div', { className: 'max-w-5xl mx-auto flex justify-between items-center' },
      h('button', { onClick: () => setPage('home'), className: 'flex items-center gap-2 text-2xl font-black gold' }, '🏆 EAST ARENA'),
      h('div', { className: 'flex gap-2' },
        h('button', { onClick: () => setPage('lookup'), className: 'px-3 py-2 text-sm hover:text-amber-400 transition' }, 'My Ticket'),
        h('button', { onClick: () => setPage('home'), className: 'px-3 py-2 text-sm hover:text-amber-400 transition' }, 'Home'),
        h('button', { onClick: () => setPage('register'), className: 'px-4 py-2 bg-amber-500 text-black rounded font-bold text-sm hover:bg-amber-400 transition' }, 'Register')
      )
    )
  );
}

// ─── Home Page ──────────────────────────────────────────────
function HomePage({ setPage }) {
  const [tournaments, setTournaments] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    fetch('/api/tournaments')
      .then(r => r.json())
      .then(data => { setTournaments(Array.isArray(data) ? data : []); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  return h('div', { className: 'space-y-10' },
    h('div', { className: 'bg-gradient-to-r from-amber-600 to-amber-500 rounded-2xl p-10 text-center text-slate-900' },
      h('h1', { className: 'text-5xl font-black mb-2' }, 'EAST ARENA'),
      h('p', { className: 'text-xl font-semibold mb-6' }, 'Premium FIFA Gaming Tournaments'),
      h('div', { className: 'flex justify-center gap-4 flex-wrap' },
        h('button', { onClick: () => setPage('register'), className: 'bg-slate-900 text-amber-400 font-bold py-3 px-8 rounded-lg hover:scale-105 transition text-lg' }, 'JOIN A TOURNAMENT'),
        h('button', { onClick: () => setPage('lookup'), className: 'bg-slate-900/50 text-slate-900 font-bold py-3 px-6 rounded-lg hover:scale-105 transition' }, 'Find My Ticket')
      )
    ),

    h('div', null,
      h('h2', { className: 'text-2xl font-black gold mb-5' }, 'UPCOMING TOURNAMENTS'),
      loading
        ? h('p', { className: 'text-slate-400' }, 'Loading...')
        : tournaments.length === 0
          ? h('p', { className: 'text-slate-400' }, 'No active tournaments at the moment.')
          : h('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-5' },
              ...tournaments.map(t =>
                h('div', { key: t.id, className: 'bg-slate-800 border border-amber-500/30 rounded-xl p-6 hover:border-amber-400/60 transition' },
                  h('div', { className: 'flex justify-between items-start mb-3' },
                    h('h3', { className: 'text-lg font-bold text-white' }, t.name),
                    h('span', { className: 'text-xs px-2 py-1 rounded bg-amber-500/20 text-amber-400 font-bold' }, t.status.toUpperCase())
                  ),
                  h('div', { className: 'space-y-1.5 text-sm mb-4' },
                    h('p', null, h('span', { className: 'text-slate-400' }, 'Entry Fee: '), h('span', { className: 'teal font-bold' }, '₦' + fmt(t.entryFee))),
                    h('p', null, h('span', { className: 'text-slate-400' }, 'Prize Pool: '), h('span', { className: 'text-green-400 font-bold' }, '₦' + fmt(t.prizePool.first + t.prizePool.second + t.prizePool.third))),
                    h('p', null, h('span', { className: 'text-slate-400' }, 'Date: '), h('span', { className: 'text-white' }, fmtDate(t.date))),
                    h('p', null, h('span', { className: 'text-slate-400' }, 'Slots: '), h('span', { className: 'text-white' }, t.registrations.length + ' / ' + t.maxPlayers))
                  ),
                  h('div', { className: 'grid grid-cols-3 gap-2 text-xs text-center mb-4' },
                    h('div', { className: 'bg-yellow-500/10 rounded p-2' }, h('div', { className: 'text-yellow-400 font-bold' }, '🥇 ₦' + fmt(t.prizePool.first)), h('div', { className: 'text-slate-400' }, '1st')),
                    h('div', { className: 'bg-slate-600/30 rounded p-2' }, h('div', { className: 'text-slate-300 font-bold' }, '🥈 ₦' + fmt(t.prizePool.second)), h('div', { className: 'text-slate-400' }, '2nd')),
                    h('div', { className: 'bg-orange-500/10 rounded p-2' }, h('div', { className: 'text-orange-400 font-bold' }, '🥉 ₦' + fmt(t.prizePool.third)), h('div', { className: 'text-slate-400' }, '3rd'))
                  ),
                  t.registrations.length >= t.maxPlayers
                    ? h('div', { className: 'w-full text-center py-2 bg-slate-600 text-slate-400 rounded font-bold text-sm' }, 'TOURNAMENT FULL')
                    : h('button', { onClick: () => setPage('register'), className: 'w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-2 rounded transition' }, 'REGISTER NOW')
                )
              )
            )
    )
  );
}

// ─── Register Page ──────────────────────────────────────────
function RegisterPage({ setPage, setRegistrationResult }) {
  const [tournaments, setTournaments] = useState([]);
  const [form, setForm] = useState({ playerName: '', gamertag: '', phone: '', location: '', tournamentId: '' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  useEffect(() => {
    fetch('/api/tournaments')
      .then(r => r.json())
      .then(data => {
        const list = Array.isArray(data) ? data : [];
        setTournaments(list);
        if (list.length > 0) setForm(f => ({ ...f, tournamentId: list[0].id }));
      });
  }, []);

  const set = (k) => (e) => setForm(f => ({ ...f, [k]: e.target.value }));

  const submit = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(form)
      });
      const data = await res.json();
      if (!res.ok) { setError(data.error || 'Registration failed'); setLoading(false); return; }
      setRegistrationResult(data);
      setPage('payment');
    } catch (err) {
      setError('Network error. Please try again.');
    }
    setLoading(false);
  };

  return h('div', { className: 'max-w-xl mx-auto' },
    h('button', { onClick: () => setPage('home'), className: 'text-amber-400 text-sm mb-6 hover:underline' }, '← Back'),
    h('h2', { className: 'text-3xl font-black gold mb-6' }, 'TOURNAMENT REGISTRATION'),
    error && h('div', { className: 'bg-red-500/20 border border-red-500 text-red-300 rounded-lg p-3 mb-4 text-sm' }, error),
    h('form', { onSubmit: submit, className: 'bg-slate-800 border border-amber-500/30 rounded-xl p-6 space-y-4' },
      h('div', { className: 'grid grid-cols-1 sm:grid-cols-2 gap-4' },
        h(Input, { label: 'Full Name', type: 'text', placeholder: 'Your full name', required: true, value: form.playerName, onChange: set('playerName') }),
        h(Input, { label: 'Gamer Tag', type: 'text', placeholder: 'In-game username', required: true, value: form.gamertag, onChange: set('gamertag') }),
        h(Input, { label: 'Phone Number', type: 'tel', placeholder: '0803...', required: true, value: form.phone, onChange: set('phone') }),
        h(Input, { label: 'City / Location', type: 'text', placeholder: 'Lagos, Abuja...', required: true, value: form.location, onChange: set('location') })
      ),
      h('div', null,
        h('label', { className: 'block text-slate-400 text-xs uppercase mb-1' }, 'Select Tournament'),
        h('select', {
          value: form.tournamentId,
          onChange: set('tournamentId'),
          required: true,
          className: 'w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white focus:border-amber-400 focus:outline-none'
        },
          tournaments.map(t => h('option', { key: t.id, value: t.id }, t.name + ' — ₦' + fmt(t.entryFee)))
        )
      ),
      h('button', { type: 'submit', disabled: loading, className: 'w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-3 rounded-lg transition disabled:opacity-50 text-lg' },
        loading ? 'Registering...' : 'REGISTER NOW'
      )
    )
  );
}

// ─── Payment Page ───────────────────────────────────────────
function PaymentPage({ result, setPage }) {
  const [ref, setRef] = useState('');
  const [submitted, setSubmitted] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  if (!result) { setPage('home'); return null; }

  const submitRef = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      const res = await fetch('/api/submit-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticketId: result.ticketId, paymentReference: ref })
      });
      const data = await res.json();
      if (!res.ok) { setError(data.error); setLoading(false); return; }
      setSubmitted(true);
    } catch (err) {
      setError('Network error. Please try again.');
    }
    setLoading(false);
  };

  if (submitted) {
    return h('div', { className: 'max-w-md mx-auto text-center' },
      h('div', { className: 'text-6xl mb-4' }, '✅'),
      h('h2', { className: 'text-2xl font-black text-green-400 mb-2' }, 'Reference Submitted!'),
      h('p', { className: 'text-slate-300 mb-4' }, 'Your payment is under review. An admin will approve it shortly.'),
      h('div', { className: 'bg-slate-800 border border-slate-700 rounded-xl p-4 mb-6 text-left text-sm space-y-2' },
        h('p', null, h('span', { className: 'text-slate-400' }, 'Ticket ID: '), h('span', { className: 'font-mono text-amber-400 font-bold' }, result.ticketId)),
        h('p', null, h('span', { className: 'text-slate-400' }, 'Status: '), h(Badge, { status: 'pending' }))
      ),
      h('a', { href: '/ticket/' + result.ticketId, className: 'block w-full bg-amber-500 text-slate-900 font-bold py-3 rounded-lg hover:bg-amber-400 transition text-center mb-3' }, 'View My Ticket'),
      h('button', { onClick: () => setPage('home'), className: 'text-slate-400 hover:text-white text-sm' }, '← Back to Home')
    );
  }

  return h('div', { className: 'max-w-md mx-auto' },
    h('h2', { className: 'text-2xl font-black gold mb-6 text-center' }, '✓ REGISTERED! Complete Payment'),
    h('div', { className: 'bg-green-500/10 border border-green-500/30 rounded-xl p-4 mb-5' },
      h('div', { className: 'text-green-400 font-bold mb-1' }, 'Registration Successful!'),
      h('p', null, h('span', { className: 'text-slate-400 text-sm' }, 'Your Ticket ID: '), h('span', { className: 'font-mono font-black text-amber-400 text-lg' }, result.ticketId))
    ),

    h('div', { className: 'bg-slate-800 border border-amber-500/30 rounded-xl p-5 mb-5' },
      h('h3', { className: 'font-bold text-amber-400 mb-3' }, '💳 Payment Instructions'),
      h('div', { className: 'space-y-2 text-sm' },
        h('div', { className: 'flex justify-between py-2 border-b border-slate-700' },
          h('span', { className: 'text-slate-400' }, 'Amount'), h('span', { className: 'font-bold text-white' }, '₦' + fmt(result.paymentInfo.amount))),
        h('div', { className: 'flex justify-between py-2 border-b border-slate-700' },
          h('span', { className: 'text-slate-400' }, 'Bank'), h('span', { className: 'font-bold text-white' }, result.paymentInfo.bankName)),
        h('div', { className: 'flex justify-between py-2 border-b border-slate-700' },
          h('span', { className: 'text-slate-400' }, 'Account Name'), h('span', { className: 'font-bold text-white' }, result.paymentInfo.accountName)),
        h('div', { className: 'flex justify-between py-2 border-b border-slate-700' },
          h('span', { className: 'text-slate-400' }, 'Account Number'), h('span', { className: 'font-mono font-black text-amber-400 text-base' }, result.paymentInfo.accountNumber)),
        h('div', { className: 'flex justify-between py-2' },
          h('span', { className: 'text-slate-400' }, 'Use as Narration'), h('span', { className: 'font-mono font-bold text-amber-400' }, result.paymentInfo.reference))
      )
    ),

    error && h('div', { className: 'bg-red-500/20 border border-red-500 text-red-300 rounded-lg p-3 mb-4 text-sm' }, error),

    h('form', { onSubmit: submitRef, className: 'bg-slate-800 border border-slate-700 rounded-xl p-5 space-y-4' },
      h('h3', { className: 'font-bold text-white' }, 'Submit Payment Reference'),
      h('p', { className: 'text-slate-400 text-sm' }, 'After sending the money, enter your bank transaction reference or receipt number below.'),
      h(Input, { label: 'Transaction Reference / Receipt Number', type: 'text', placeholder: 'e.g. TRN2024071234567', required: true, value: ref, onChange: e => setRef(e.target.value) }),
      h('button', { type: 'submit', disabled: loading || !ref.trim(), className: 'w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg transition disabled:opacity-50' },
        loading ? 'Submitting...' : 'SUBMIT PAYMENT REFERENCE'
      )
    ),

    h('div', { className: 'mt-4 text-center' },
      h('a', { href: '/ticket/' + result.ticketId, className: 'text-amber-400 text-sm hover:underline' }, 'View ticket page →')
    )
  );
}

// ─── Ticket Lookup Page ─────────────────────────────────────
function LookupPage() {
  const [ticketId, setTicketId] = useState('');
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const search = async (e) => {
    e.preventDefault();
    setError(''); setResult(null); setLoading(true);
    try {
      const res = await fetch('/api/ticket/' + ticketId.trim().toUpperCase());
      const data = await res.json();
      if (!res.ok) { setError(data.error || 'Ticket not found'); }
      else setResult(data);
    } catch {
      setError('Network error. Please try again.');
    }
    setLoading(false);
  };

  return h('div', { className: 'max-w-md mx-auto' },
    h('h2', { className: 'text-2xl font-black gold mb-6' }, '🔍 Find My Ticket'),
    h('form', { onSubmit: search, className: 'flex gap-2 mb-5' },
      h('input', { type: 'text', value: ticketId, onChange: e => setTicketId(e.target.value), placeholder: 'Enter Ticket ID (e.g. A1B2C3D4)', required: true, className: 'flex-1 bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:border-amber-400 focus:outline-none font-mono' }),
      h('button', { type: 'submit', disabled: loading, className: 'px-5 py-2 bg-amber-500 text-black font-bold rounded-lg hover:bg-amber-400 transition disabled:opacity-50' }, loading ? '...' : 'FIND')
    ),
    error && h('div', { className: 'bg-red-500/20 border border-red-500 text-red-300 rounded-lg p-3 mb-4 text-sm' }, error),
    result && h('div', { className: 'bg-slate-800 border border-amber-500/30 rounded-xl p-5 space-y-3' },
      h('div', { className: 'flex justify-between items-center' },
        h('div', { className: 'font-black text-xl text-amber-400 font-mono' }, result.ticketId),
        h(Badge, { status: result.paymentStatus })
      ),
      h('div', { className: 'text-sm space-y-1 border-t border-slate-700 pt-3' },
        h('p', null, h('span', { className: 'text-slate-400' }, 'Player: '), h('span', { className: 'font-bold' }, result.playerName)),
        h('p', null, h('span', { className: 'text-slate-400' }, 'Gamer Tag: '), h('span', { className: 'text-amber-400 font-bold' }, result.gamertag)),
        result.tournament && h('p', null, h('span', { className: 'text-slate-400' }, 'Tournament: '), h('span', null, result.tournament.name)),
        result.paymentReference && h('p', null, h('span', { className: 'text-slate-400' }, 'Reference: '), h('span', { className: 'font-mono text-sm' }, result.paymentReference))
      ),
      result.paymentStatus === 'pending' && !result.paymentReference && h('div', { className: 'bg-yellow-500/10 border border-yellow-500/30 rounded p-3 text-sm text-yellow-300' }, '⚠ No payment reference submitted yet. Please submit your payment reference.'),
      h('a', { href: '/ticket/' + result.ticketId, className: 'block text-center bg-amber-500 text-slate-900 font-bold py-2 rounded-lg hover:bg-amber-400 transition text-sm' }, 'View Full Ticket →')
    )
  );
}

// ─── App Root ────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [registrationResult, setRegistrationResult] = useState(null);

  return h('div', { className: 'min-h-screen bg-slate-950' },
    h(Nav, { page, setPage }),
    h('main', { className: 'max-w-5xl mx-auto p-6' },
      page === 'home'     && h(HomePage, { setPage }),
      page === 'register' && h(RegisterPage, { setPage, setRegistrationResult }),
      page === 'payment'  && h(PaymentPage, { result: registrationResult, setPage }),
      page === 'lookup'   && h(LookupPage)
    ),
    h('footer', { className: 'text-center text-slate-600 text-xs py-8' }, 'East Arena Gaming • Premium FIFA Tournaments • ', h('a', { href: '/admin', className: 'hover:text-slate-400' }, 'Admin'))
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
