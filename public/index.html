<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>East Arena Gaming Tournament</title>
  <link rel="icon" href="/favicon.svg" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0F1419; color: #fff; font-family: system-ui, sans-serif; }
    .gold { color: #D4AF37; }
    .teal { color: #00D9FF; }
    input, select, textarea { color-scheme: dark; }
    .game-badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700; padding:2px 8px; border-radius:4px; letter-spacing:.04em; text-transform:uppercase; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, createElement: h } = React;

// ─── Helpers ──────────────────────────────────────────────────────────
function fmt(n) { return Number(n).toLocaleString(); }
function fmtDate(d) { return new Date(d).toLocaleDateString('en-NG', { day:'numeric', month:'short', year:'numeric' }); }

const GAME_CONFIG = {
  'FIFA':       { icon: '⚽', color: 'bg-blue-600/30 text-blue-300' },
  'CODM':       { icon: '🔫', color: 'bg-red-600/30 text-red-300' },
  'Free Fire':  { icon: '🔥', color: 'bg-orange-600/30 text-orange-300' },
  'PUBG':       { icon: '🎯', color: 'bg-yellow-600/30 text-yellow-300' },
  'default':    { icon: '🎮', color: 'bg-slate-600/50 text-slate-300' },
};
function gameStyle(game) { return GAME_CONFIG[game] || GAME_CONFIG.default; }

function Badge({ status }) {
  const cfg = {
    confirmed: ['bg-green-600', '✓ Confirmed'],
    pending:   ['bg-yellow-500 text-slate-900', '⏳ Pending'],
    rejected:  ['bg-red-600', '✗ Rejected'],
  };
  const [cls, label] = cfg[status] || ['bg-slate-600', status];
  return h('span', { className: `px-2 py-0.5 rounded text-xs font-bold ${cls}` }, label);
}

function Input({ label, ...props }) {
  return h('div', null,
    label && h('label', { className: 'block text-slate-400 text-xs uppercase mb-1' }, label),
    h('input', {
      className: 'w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white placeholder-slate-500 focus:border-amber-400 focus:outline-none',
      ...props
    })
  );
}

// ─── Nav ───────────────────────────────────────────────────────────────
function Nav({ page, setPage }) {
  const [menuOpen, setMenuOpen] = useState(false);
  return h('nav', { className: 'bg-slate-900 border-b border-amber-500/20 px-4 py-3 sticky top-0 z-50' },
    h('div', { className: 'max-w-5xl mx-auto flex justify-between items-center' },
      h('button', { onClick: () => { setPage('home'); setMenuOpen(false); }, className: 'flex flex-col leading-tight' },
        h('span', { className: 'text-xl font-black text-amber-400 tracking-tight' }, '🏆 EAST ARENA'),
        h('span', { className: 'text-xs text-slate-400 font-medium -mt-0.5' }, 'Gaming Tournament')
      ),
      h('div', { className: 'hidden sm:flex gap-2 items-center' },
        h('button', { onClick: () => setPage('lookup'), className: 'px-3 py-2 text-sm text-slate-300 hover:text-amber-400 transition' }, 'My Ticket'),
        h('button', { onClick: () => setPage('home'), className: 'px-3 py-2 text-sm text-slate-300 hover:text-amber-400 transition' }, 'Home'),
        h('button', { onClick: () => setPage('register'), className: 'px-4 py-2 bg-amber-500 text-black rounded-lg font-bold text-sm hover:bg-amber-400 transition' }, 'Register Now')
      ),
      h('button', { onClick: () => setMenuOpen(!menuOpen), className: 'sm:hidden p-2 text-slate-400' }, menuOpen ? '✕' : '☰')
    ),
    menuOpen && h('div', { className: 'sm:hidden bg-slate-900 border-t border-slate-800 px-4 py-3 space-y-2' },
      h('button', { onClick: () => { setPage('home'); setMenuOpen(false); }, className: 'block w-full text-left py-2 text-slate-300' }, 'Home'),
      h('button', { onClick: () => { setPage('lookup'); setMenuOpen(false); }, className: 'block w-full text-left py-2 text-slate-300' }, 'My Ticket'),
      h('button', { onClick: () => { setPage('register'); setMenuOpen(false); }, className: 'block w-full py-2 mt-1 bg-amber-500 text-black font-bold rounded-lg' }, 'Register Now')
    )
  );
}

// ─── Home Page ────────────────────────────────────────────────────────
function HomePage({ setPage }) {
  const [tournaments, setTournaments] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    fetch('/api/tournaments')
      .then(r => r.json())
      .then(data => { setTournaments(Array.isArray(data) ? data : []); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  // Coming-soon games
  const comingSoon = [
    { name: 'Call of Duty Mobile', icon: '🔫', status: 'Coming Soon' },
    { name: 'Free Fire',           icon: '🔥', status: 'Coming Soon' },
    { name: 'PUBG Mobile',         icon: '🎯', status: 'Coming Soon' },
    { name: 'eFootball',           icon: '⚽', status: 'Coming Soon' },
  ];

  return h('div', { className: 'space-y-12' },

    // ── Hero ──────────────────────────────────────────────────────────
    h('div', { className: 'relative bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 rounded-2xl p-8 sm:p-12 overflow-hidden border border-amber-500/20' },
      h('div', { className: 'absolute inset-0 bg-gradient-to-r from-amber-600/10 to-transparent pointer-events-none' }),
      h('div', { className: 'relative text-center' },
        h('div', { className: 'inline-flex items-center gap-2 bg-amber-500/10 border border-amber-500/30 rounded-full px-4 py-1 text-amber-400 text-xs font-bold uppercase tracking-widest mb-5' },
          h('span', null, '🎮'), 'Competitive Gaming Nigeria'
        ),
        h('h1', { className: 'text-4xl sm:text-6xl font-black text-white mb-3 leading-tight' },
          'EAST ARENA', h('br'), h('span', { className: 'text-amber-400' }, 'GAMING TOURNAMENT')
        ),
        h('p', { className: 'text-slate-300 text-lg sm:text-xl mb-2 max-w-xl mx-auto' },
          "Africa's Premier Multi-Game Tournament Platform"
        ),
        h('p', { className: 'text-slate-500 text-sm mb-8' }, 'FIFA · Call of Duty Mobile · Free Fire · More Games Coming'),
        h('div', { className: 'flex flex-col sm:flex-row justify-center gap-3' },
          h('button', { onClick: () => setPage('register'), className: 'px-8 py-3 bg-amber-500 text-slate-900 font-black rounded-xl hover:bg-amber-400 transition text-lg shadow-lg shadow-amber-500/20' }, '🏆 JOIN A TOURNAMENT'),
          h('button', { onClick: () => setPage('lookup'), className: 'px-6 py-3 bg-slate-700 text-white font-bold rounded-xl hover:bg-slate-600 transition border border-slate-600' }, '🔍 Find My Ticket')
        )
      )
    ),

    // ── Active Tournaments ────────────────────────────────────────────
    h('div', null,
      h('div', { className: 'flex justify-between items-center mb-5' },
        h('h2', { className: 'text-2xl font-black text-amber-400' }, '🏅 ACTIVE TOURNAMENTS'),
        h('span', { className: 'text-slate-500 text-xs' }, 'Season 1')
      ),
      loading
        ? h('p', { className: 'text-slate-400' }, 'Loading...')
        : tournaments.length === 0
          ? h('div', { className: 'bg-slate-800 border border-slate-700 rounded-xl p-10 text-center text-slate-400' },
              h('div', { className: 'text-4xl mb-3' }, '🎮'),
              'No active tournaments at the moment. Check back soon.'
            )
          : h('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-5' },
              ...tournaments.map(t => {
                const gs = gameStyle(t.game);
                const isFull = t.registrations.length >= t.maxPlayers;
                return h('div', { key: t.id, className: 'bg-slate-800 border border-amber-500/20 rounded-xl p-6 hover:border-amber-400/50 transition flex flex-col' },
                  h('div', { className: 'flex justify-between items-start mb-3' },
                    h('div', null,
                      t.game && h('span', { className: `game-badge ${gs.color} mb-2 inline-block` }, gs.icon + ' ' + t.game),
                      h('h3', { className: 'text-lg font-bold text-white leading-tight' }, t.name)
                    ),
                    h('span', { className: `text-xs px-2 py-1 rounded font-bold ${isFull ? 'bg-red-500/20 text-red-400' : 'bg-green-500/20 text-green-400'}` }, isFull ? 'FULL' : t.status.toUpperCase())
                  ),
                  h('div', { className: 'space-y-1.5 text-sm mb-4 flex-1' },
                    h('div', { className: 'flex justify-between' }, h('span', { className: 'text-slate-400' }, 'Entry Fee'), h('span', { className: 'font-bold teal' }, '₦' + fmt(t.entryFee))),
                    h('div', { className: 'flex justify-between' }, h('span', { className: 'text-slate-400' }, 'Total Prize'), h('span', { className: 'font-bold text-green-400' }, '₦' + fmt(t.prizePool.first + t.prizePool.second + t.prizePool.third))),
                    h('div', { className: 'flex justify-between' }, h('span', { className: 'text-slate-400' }, 'Date'), h('span', { className: 'text-white' }, fmtDate(t.date))),
                    h('div', { className: 'flex justify-between items-center' },
                      h('span', { className: 'text-slate-400' }, 'Slots'),
                      h('span', { className: 'text-white' }, t.registrations.length + ' / ' + t.maxPlayers + ' ',
                        h('span', { className: 'text-slate-500 text-xs' }, 'registered')
                      )
                    )
                  ),
                  h('div', { className: 'w-full bg-slate-700 rounded-full h-1.5 mb-4' },
                    h('div', { className: 'bg-amber-500 h-1.5 rounded-full transition-all', style: { width: Math.min(100, (t.registrations.length / t.maxPlayers) * 100) + '%' } })
                  ),
                  h('div', { className: 'grid grid-cols-3 gap-2 text-xs text-center mb-4' },
                    h('div', { className: 'bg-yellow-500/10 rounded-lg p-2' }, h('div', { className: 'text-yellow-400 font-bold' }, '🥇 ₦' + fmt(t.prizePool.first)), h('div', { className: 'text-slate-500' }, '1st Place')),
                    h('div', { className: 'bg-slate-600/30 rounded-lg p-2' }, h('div', { className: 'text-slate-300 font-bold' }, '🥈 ₦' + fmt(t.prizePool.second)), h('div', { className: 'text-slate-500' }, '2nd Place')),
                    h('div', { className: 'bg-orange-500/10 rounded-lg p-2' }, h('div', { className: 'text-orange-400 font-bold' }, '🥉 ₦' + fmt(t.prizePool.third)), h('div', { className: 'text-slate-500' }, '3rd Place'))
                  ),
                  isFull
                    ? h('div', { className: 'w-full text-center py-2.5 bg-slate-700 text-slate-500 rounded-lg font-bold text-sm' }, 'TOURNAMENT FULL')
                    : h('button', { onClick: () => setPage('register'), className: 'w-full bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold py-2.5 rounded-lg transition' }, 'REGISTER NOW →')
                );
              })
            )
    ),

    // ── Coming Soon Games ─────────────────────────────────────────────
    h('div', null,
      h('div', { className: 'flex items-center gap-3 mb-5' },
        h('h2', { className: 'text-2xl font-black text-white' }, 'MORE GAMES COMING SOON'),
        h('span', { className: 'bg-amber-500/20 text-amber-400 text-xs font-bold px-2 py-1 rounded' }, '2025')
      ),
      h('div', { className: 'grid grid-cols-2 sm:grid-cols-4 gap-4' },
        ...comingSoon.map(g =>
          h('div', { key: g.name, className: 'bg-slate-800/50 border border-slate-700 rounded-xl p-5 text-center opacity-70 hover:opacity-90 transition' },
            h('div', { className: 'text-3xl mb-2' }, g.icon),
            h('div', { className: 'font-bold text-white text-sm mb-1' }, g.name),
            h('div', { className: 'text-xs bg-slate-700 text-slate-400 rounded-full px-3 py-1 inline-block' }, g.status)
          )
        )
      )
    ),

    // ── How It Works ──────────────────────────────────────────────────
    h('div', { className: 'bg-slate-800/50 border border-slate-700 rounded-2xl p-6 sm:p-8' },
      h('h2', { className: 'text-xl font-black text-white mb-6 text-center' }, 'HOW IT WORKS'),
      h('div', { className: 'grid grid-cols-1 sm:grid-cols-4 gap-6 text-center' },
        ...[
          { step: '1', icon: '📋', title: 'Register', desc: 'Fill in your details and pick a tournament' },
          { step: '2', icon: '💳', title: 'Pay Entry Fee', desc: 'Bank transfer to our account' },
          { step: '3', icon: '✅', title: 'Get Confirmed', desc: 'Admin approves your payment' },
          { step: '4', icon: '🎮', title: 'Compete', desc: 'Show your QR ticket and play' },
        ].map(s =>
          h('div', { key: s.step, className: 'flex flex-col items-center' },
            h('div', { className: 'w-10 h-10 rounded-full bg-amber-500 text-slate-900 font-black flex items-center justify-center text-lg mb-2' }, s.step),
            h('div', { className: 'text-2xl mb-1' }, s.icon),
            h('div', { className: 'font-bold text-white mb-1' }, s.title),
            h('div', { className: 'text-slate-400 text-xs' }, s.desc)
          )
        )
      )
    )
  );
}

// ─── Register Page ────────────────────────────────────────────────────
function RegisterPage({ setPage, setRegistrationResult }) {
  const [tournaments, setTournaments] = useState([]);
  const [form, setForm] = useState({ playerName: '', gamertag: '', phone: '', location: '', tournamentId: '' });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  useEffect(() => {
    fetch('/api/tournaments')
      .then(r => r.json())
      .then(data => {
        const list = Array.isArray(data) ? data : [];
        setTournaments(list);
        if (list.length > 0) setForm(f => ({ ...f, tournamentId: list[0].id }));
      });
  }, []);

  const set = k => e => setForm(f => ({ ...f, [k]: e.target.value }));

  const submit = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(form)
      });
      const data = await res.json();
      if (!res.ok) { setError(data.error || 'Registration failed'); setLoading(false); return; }
      setRegistrationResult(data);
      setPage('payment');
    } catch {
      setError('Network error. Please try again.');
    }
    setLoading(false);
  };

  const selTournament = tournaments.find(t => String(t.id) === String(form.tournamentId));
  const gs = selTournament?.game ? gameStyle(selTournament.game) : null;

  return h('div', { className: 'max-w-xl mx-auto' },
    h('button', { onClick: () => setPage('home'), className: 'text-amber-400 text-sm mb-5 hover:underline flex items-center gap-1' }, '← Back to Home'),
    h('h2', { className: 'text-3xl font-black text-amber-400 mb-1' }, 'TOURNAMENT REGISTRATION'),
    h('p', { className: 'text-slate-400 text-sm mb-6' }, 'East Arena Gaming Tournament — Season 1'),
    error && h('div', { className: 'bg-red-500/20 border border-red-500 text-red-300 rounded-lg p-3 mb-4 text-sm' }, '⚠ ' + error),

    selTournament && h('div', { className: 'bg-slate-800 border border-amber-500/30 rounded-xl p-4 mb-5' },
      h('div', { className: 'flex justify-between items-start' },
        h('div', null,
          gs && h('span', { className: `game-badge ${gs.color} mb-1 inline-block` }, gs.icon + ' ' + selTournament.game),
          h('div', { className: 'font-bold text-white' }, selTournament.name),
          h('div', { className: 'text-slate-400 text-xs mt-1' }, fmtDate(selTournament.date) + ' · ' + selTournament.registrations.length + '/' + selTournament.maxPlayers + ' registered')
        ),
        h('div', { className: 'text-right' },
          h('div', { className: 'text-amber-400 font-black text-lg' }, '₦' + fmt(selTournament.entryFee)),
          h('div', { className: 'text-slate-500 text-xs' }, 'entry fee')
        )
      )
    ),

    h('form', { onSubmit: submit, className: 'bg-slate-800 border border-slate-700 rounded-xl p-6 space-y-4' },
      h('div', { className: 'grid grid-cols-1 sm:grid-cols-2 gap-4' },
        h(Input, { label: 'Full Name', type: 'text', placeholder: 'Your full name', required: true, value: form.playerName, onChange: set('playerName'), autoComplete: 'name' }),
        h(Input, { label: 'In-Game Tag / Username', type: 'text', placeholder: 'Your in-game name', required: true, value: form.gamertag, onChange: set('gamertag'), autoComplete: 'off' }),
        h(Input, { label: 'Phone Number', type: 'tel', placeholder: '0803...', required: true, value: form.phone, onChange: set('phone'), autoComplete: 'tel' }),
        h(Input, { label: 'City / Location', type: 'text', placeholder: 'Lagos, Abuja, PH...', required: true, value: form.location, onChange: set('location') })
      ),
      h('div', null,
        h('label', { className: 'block text-slate-400 text-xs uppercase mb-1' }, 'Select Tournament'),
        h('select', {
          value: form.tournamentId,
          onChange: set('tournamentId'),
          required: true,
          className: 'w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-2 text-white focus:border-amber-400 focus:outline-none'
        },
          tournaments.map(t => h('option', { key: t.id, value: t.id }, (t.game ? '[' + t.game + '] ' : '') + t.name + ' — ₦' + fmt(t.entryFee)))
        )
      ),
      h('div', { className: 'border-t border-slate-700 pt-4' },
        h('button', { type: 'submit', disabled: loading, className: 'w-full bg-amber-500 hover:bg-amber-400 text-slate-900 font-black py-3 rounded-xl transition disabled:opacity-50 text-lg' },
          loading ? 'Processing...' : '🏆 REGISTER NOW'
        ),
        h('p', { className: 'text-slate-500 text-xs text-center mt-2' }, 'You will receive bank payment instructions after registering')
      )
    )
  );
}

// ─── Payment Page ─────────────────────────────────────────────────────
function PaymentPage({ result, setPage }) {
  const [ref, setRef] = useState('');
  const [submitted, setSubmitted] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  if (!result) { setPage('home'); return null; }

  const submitRef = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      const res = await fetch('/api/submit-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticketId: result.ticketId, paymentReference: ref })
      });
      const data = await res.json();
      if (!res.ok) { setError(data.error || 'Submission failed'); setLoading(false); return; }
      setSubmitted(true);
    } catch {
      setError('Network error. Please try again.');
    }
    setLoading(false);
  };

  if (submitted) {
    return h('div', { className: 'max-w-md mx-auto text-center' },
      h('div', { className: 'text-6xl mb-4' }, '✅'),
      h('h2', { className: 'text-2xl font-black text-green-400 mb-2' }, 'Reference Submitted!'),
      h('p', { className: 'text-slate-300 mb-5' }, 'Your payment reference has been sent. An admin will review and approve it shortly.'),
      h('div', { className: 'bg-slate-800 border border-slate-700 rounded-xl p-4 mb-5 text-left space-y-2 text-sm' },
        h('div', { className: 'flex justify-between' }, h('span', { className: 'text-slate-400' }, 'Ticket ID'), h('span', { className: 'font-mono font-bold text-amber-400' }, result.ticketId)),
        h('div', { className: 'flex justify-between' }, h('span', { className: 'text-slate-400' }, 'Status'), h(Badge, { status: 'pending' }))
      ),
      h('a', { href: '/ticket/' + result.ticketId, className: 'block w-full bg-amber-500 text-slate-900 font-bold py-3 rounded-xl hover:bg-amber-400 transition text-center mb-3' }, 'View My Ticket →'),
      h('button', { onClick: () => setPage('home'), className: 'text-slate-400 hover:text-white text-sm transition' }, '← Back to Home')
    );
  }

  return h('div', { className: 'max-w-md mx-auto' },
    h('div', { className: 'bg-green-500/10 border border-green-500/30 rounded-xl p-4 mb-5' },
      h('div', { className: 'text-green-400 font-bold text-lg mb-1' }, '✓ Registration Successful!'),
      h('div', { className: 'flex justify-between text-sm' },
        h('span', { className: 'text-slate-400' }, 'Your Ticket ID'),
        h('span', { className: 'font-mono font-black text-amber-400 text-base' }, result.ticketId)
      )
    ),

    h('div', { className: 'bg-slate-800 border border-amber-500/30 rounded-xl p-5 mb-5' },
      h('h3', { className: 'font-black text-amber-400 mb-4 flex items-center gap-2' }, '💳 PAYMENT INSTRUCTIONS'),
      h('p', { className: 'text-slate-300 text-sm mb-4' }, 'Send the exact entry fee to the account below, using your Ticket ID as the payment narration:'),
      h('div', { className: 'space-y-0 rounded-lg overflow-hidden border border-slate-700' },
        ...[
          ['Amount',         '₦' + fmt(result.paymentInfo.amount), true],
          ['Bank',           result.paymentInfo.bankName, false],
          ['Account Name',   result.paymentInfo.accountName, false],
          ['Account Number', result.paymentInfo.accountNumber, true],
          ['Narration',      result.ticketId, true],
        ].map(([label, value, highlight]) =>
          h('div', { className: 'flex justify-between items-center px-4 py-3 bg-slate-700/50 border-b border-slate-700 last:border-0' },
            h('span', { className: 'text-slate-400 text-sm' }, label),
            h('span', { className: `font-bold text-sm ${highlight ? 'text-amber-400 font-mono' : 'text-white'}` }, value)
          )
        )
      ),
      h('div', { className: 'mt-3 bg-yellow-500/10 border border-yellow-500/30 rounded-lg p-3 text-xs text-yellow-300' },
        '⚠ Important: Use your Ticket ID (', h('strong', null, result.ticketId), ') as the transfer narration so we can identify your payment.'
      )
    ),

    error && h('div', { className: 'bg-red-500/20 border border-red-500 text-red-300 rounded-lg p-3 mb-4 text-sm' }, error),

    h('form', { onSubmit: submitRef, className: 'bg-slate-800 border border-slate-700 rounded-xl p-5 space-y-4' },
      h('h3', { className: 'font-bold text-white' }, 'Confirm Your Transfer'),
      h('p', { className: 'text-slate-400 text-sm' }, 'After making the transfer, paste your bank transaction reference number below so we can verify your payment.'),
      h(Input, {
        label: 'Bank Transaction Reference',
        type: 'text',
        placeholder: 'e.g. TRN2024071234567',
        required: true,
        value: ref,
        onChange: e => setRef(e.target.value),
        autoComplete: 'off'
      }),
      h('button', { type: 'submit', disabled: loading || !ref.trim(), className: 'w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl transition disabled:opacity-50' },
        loading ? 'Submitting...' : '✓ SUBMIT PAYMENT REFERENCE'
      ),
      h('p', { className: 'text-slate-500 text-xs text-center' }, 'Your ticket will be confirmed within 30 minutes after submission during business hours.')
    ),

    h('div', { className: 'mt-4 text-center' },
      h('a', { href: '/ticket/' + result.ticketId, className: 'text-amber-400 text-sm hover:underline' }, 'View ticket page →')
    )
  );
}

// ─── Ticket Lookup ────────────────────────────────────────────────────
function LookupPage() {
  const [ticketId, setTicketId] = useState('');
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const search = async (e) => {
    e.preventDefault();
    setError(''); setResult(null); setLoading(true);
    try {
      const res = await fetch('/api/ticket/' + ticketId.trim().toUpperCase());
      const data = await res.json();
      if (!res.ok) { setError(data.error || 'Ticket not found'); }
      else setResult(data);
    } catch {
      setError('Network error. Please try again.');
    }
    setLoading(false);
  };

  return h('div', { className: 'max-w-md mx-auto' },
    h('h2', { className: 'text-2xl font-black text-amber-400 mb-2' }, '🔍 Find My Ticket'),
    h('p', { className: 'text-slate-400 text-sm mb-6' }, 'Enter the Ticket ID you received when you registered.'),
    h('form', { onSubmit: search, className: 'flex gap-2 mb-5' },
      h('input', { type: 'text', value: ticketId, onChange: e => setTicketId(e.target.value), placeholder: 'e.g. A1B2C3D4', required: true, className: 'flex-1 bg-slate-700 border border-slate-600 rounded-xl px-4 py-2.5 text-white placeholder-slate-500 focus:border-amber-400 focus:outline-none font-mono uppercase', maxLength: 8, autoComplete: 'off' }),
      h('button', { type: 'submit', disabled: loading, className: 'px-5 py-2.5 bg-amber-500 text-black font-bold rounded-xl hover:bg-amber-400 transition disabled:opacity-50' }, loading ? '...' : 'FIND')
    ),
    error && h('div', { className: 'bg-red-500/20 border border-red-500 text-red-300 rounded-lg p-3 mb-4 text-sm' }, error),
    result && h('div', { className: 'bg-slate-800 border border-amber-500/30 rounded-xl p-5 space-y-3' },
      h('div', { className: 'flex justify-between items-center' },
        h('div', { className: 'font-black text-xl text-amber-400 font-mono' }, result.ticketId),
        h(Badge, { status: result.paymentStatus })
      ),
      h('div', { className: 'text-sm space-y-2 border-t border-slate-700 pt-3' },
        h('div', { className: 'flex justify-between' }, h('span', { className: 'text-slate-400' }, 'Player'), h('span', { className: 'font-bold' }, result.playerName)),
        h('div', { className: 'flex justify-between' }, h('span', { className: 'text-slate-400' }, 'In-Game Tag'), h('span', { className: 'text-amber-400 font-bold' }, result.gamertag)),
        result.tournament && h('div', { className: 'flex justify-between' }, h('span', { className: 'text-slate-400' }, 'Tournament'), h('span', { className: 'text-right text-xs max-w-[60%]' }, result.tournament.name)),
        result.paymentReference && h('div', { className: 'flex justify-between' }, h('span', { className: 'text-slate-400' }, 'Reference'), h('span', { className: 'font-mono text-xs' }, result.paymentReference))
      ),
      result.paymentStatus === 'pending' && !result.paymentReference &&
        h('div', { className: 'bg-yellow-500/10 border border-yellow-500/30 rounded-lg p-3 text-xs text-yellow-300' }, '⚠ No payment reference submitted yet. Please submit your bank transfer reference.'),
      h('a', { href: '/ticket/' + result.ticketId, className: 'block text-center bg-amber-500 text-slate-900 font-bold py-2.5 rounded-xl hover:bg-amber-400 transition text-sm mt-2' }, 'View Full Ticket →')
    )
  );
}

// ─── App Root ──────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('home');
  const [registrationResult, setRegistrationResult] = useState(null);

  return h('div', { className: 'min-h-screen bg-slate-950' },
    h(Nav, { page, setPage }),
    h('main', { className: 'max-w-5xl mx-auto px-4 py-8' },
      page === 'home'     && h(HomePage, { setPage }),
      page === 'register' && h(RegisterPage, { setPage, setRegistrationResult }),
      page === 'payment'  && h(PaymentPage, { result: registrationResult, setPage }),
      page === 'lookup'   && h(LookupPage)
    ),
    h('footer', { className: 'border-t border-slate-800 mt-16 py-8 px-4' },
      h('div', { className: 'max-w-5xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4 text-xs text-slate-600' },
        h('div', null,
          h('div', { className: 'font-black text-slate-500 mb-1' }, '🏆 East Arena Gaming Tournament'),
          'Premier Competitive Gaming Platform · Nigeria'
        ),
        h('div', { className: 'flex gap-4' },
          h('span', null, '⚽ FIFA'),
          h('span', { className: 'opacity-40' }, '🔫 CODM (Soon)'),
          h('span', { className: 'opacity-40' }, '🔥 Free Fire (Soon)')
        ),
        h('a', { href: '/admin', className: 'hover:text-slate-400 transition' }, 'Admin Panel')
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
